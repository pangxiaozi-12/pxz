<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my rose</title>
  
  <!-- 引入外部资源 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <!-- Tailwind 配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rose: '#e91e63',
            romantic: '#fff0f5',
          },
          fontFamily: {
            serif: ['Georgia', 'Cambria', 'serif'],
          },
        },
      }
    }
  </script>
  
  <!-- 自定义样式 -->
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .fullscreen-video {
        object-fit: cover;
        width: 100vw;
        height: 100vh;
      }
      .rose-appear {
        animation: riseAndGrow 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      .text-reveal {
        animation: fadeInUp 1s ease-out forwards;
      }
    }
  </style>
  
  <style>
    /* 基础样式 */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
    }
    
    /* 动画定义 */
    @keyframes riseAndGrow {
      0% {
        transform: scale(0) translateY(100vh);
        opacity: 0;
      }
      70% {
        transform: scale(1.1) translateY(-20px);
        opacity: 1;
      }
      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }
    
    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeOut {
      0% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }
    
    /* 交互元素样式 */
    #rose {
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    
    #rose:hover {
      transform: scale(1.05) rotate(2deg);
    }
    
    .next-link {
      position: relative;
      display: inline-block;
      color: #e91e63;
      text-decoration: none;
      font-weight: bold;
    }
    
    .next-link::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -2px;
      left: 0;
      background-color: #e91e63;
      transition: width 0.3s ease;
    }
    
    .next-link:hover::after {
      width: 100%;
    }
    
    .fade-out {
      animation: fadeOut 0.8s ease-out forwards; 
    }
  </style>
</head>
<body>
  <!-- 视频容器 -->
  <div id="video-container" class="absolute inset-0 z-30">
    <video id="fullscreen-video" class="fullscreen-video" muted playsinline>
      <!-- 替换为您的视频URL -->
      <source src="小王子.mp4" type="video/mp4">
      您的浏览器不支持HTML5视频
    </video>
  </div>
  
  <!-- 玫瑰容器 -->
  <div id="rose-container" class="absolute inset-0 z-20 flex items-center justify-center hidden">
    <img id="rose" src="玫瑰.jpg" alt="红玫瑰" class="max-w-[80%] max-h-[80vh] object-contain rounded-lg shadow-2xl">
  </div>
  
  <!-- 文字内容容器 -->
  <div id="text-container" class="absolute inset-0 z-10 flex items-center justify-center hidden p-4">
    <div class="bg-black/60 backdrop-blur-md p-8 md:p-12 rounded-xl max-w-2xl text-center text-romantic">
      <p class="text-xl md:text-2xl mb-6 leading-relaxed font-serif">
        也许世界上也有五千朵和你一模一样的花，但只有你是我独一无二的玫瑰。
        爱不仅仅是彼此凝视，而是两个人看往同一个方向。
      </p >
      <p class="text-lg md:text-xl font-serif">
        想知道这份情感的全部吗？请点击
        <a href="We/index.html" class="next-link">这里</a >
        继续我们的故事
      </p >
    </div>
  </div>

  <audio id="bgm" src="小王子.mp3" loop></audio>

  <script>
    // 获取DOM元素
    const video = document.getElementById('fullscreen-video');
    const videoContainer = document.getElementById('video-container');
    const roseContainer = document.getElementById('rose-container');
    const rose = document.getElementById('rose');
    const textContainer = document.getElementById('text-container');
    
    // 视频结束后显示玫瑰
    // 第一步：点击视频 → 同时播放视频和音乐（只触发一次）
    video.addEventListener('click', () => {
      video.play();
      document.getElementById("bgm").play();
    }, { once: true });


    // 第二步：视频播放结束 → 切换到玫瑰
    video.addEventListener('ended', () => {
      // 视频淡出效果
      videoContainer.classList.add('fade-out');

      setTimeout(() => {
        videoContainer.style.display = 'none';

        // 显示玫瑰
        roseContainer.classList.remove('hidden');
        rose.classList.add('rose-appear');

      }, 800); // ✅ 这里是时间，不是对象
    });
    
    // 点击玫瑰显示文字
    rose.addEventListener('click', () => {
      // 玫瑰淡出
      rose.classList.add('fade-out');
      setTimeout(() => {
        roseContainer.style.display = 'none';
        // 显示文字内容
        textContainer.classList.remove('hidden');
        textContainer.querySelector('div').classList.add('text-reveal');
      }, 500);
    });
    
    // 预加载玫瑰图片
    window.addEventListener('load', () => {
      const preloadRose = new Image();
      preloadRose.src = rose.src;
    });
  </script>

</body>
</html>
